domain: healthcare
resource: Condition
version: "0.1.0"
schema_version: "fhir-r4-condition"

# FHIR R4 Condition rules. condition_id and patient_id are IDs (never imputed);
# patient_id is PHI and is masked unless audit_include_phi=True.
rules:
  - id: HC-C001
    name: condition_id is present
    layer: schema
    severity: error
    field: condition_id
    check: not_null
    repair: none

  - id: HC-C002
    name: patient_id is present
    layer: schema
    severity: error
    field: patient_id
    check: not_null
    repair: none

  - id: HC-C003
    name: code_value is present
    layer: schema
    severity: error
    field: code_value
    check: not_null
    repair: none

  - id: HC-C004
    name: clinical_status is a valid FHIR clinical-status code
    layer: reference
    severity: warning
    field: clinical_status
    check: reference
    params:
      reference: condition_clinical_status
      case_insensitive: true
    repair: flag_only

  - id: HC-C005
    name: ICD-10 code is in the documented common set
    layer: reference
    severity: warning
    fields: [code_value, code_system]
    check: custom
    params:
      func: icd10_when_icd10
    repair: flag_only

  - id: HC-C006
    name: onset_date is ISO 8601
    layer: format
    severity: warning
    field: onset_date
    check: custom
    params:
      func: fhir_date
    repair: flag_only
