name: Release

# Publish freshdata to PyPI when a version tag is pushed (e.g. v0.5.0),
# or manually via the Actions tab.
#
# Authentication uses PyPI Trusted Publishing (OIDC) — configure the trusted
# publisher once at https://pypi.org/manage/project/freshdata-cleaner/settings/publishing/
# (workflow: release.yml, environment: pypi). No API token is stored in the repo.
# To use a token instead, delete the `permissions: id-token` block and add a
# `password: ${{ secrets.PYPI_API_TOKEN }}` line to the publish step.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/freshdata-cleaner/
    permissions:
      id-token: write   # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
